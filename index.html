<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Garden Layered 3D Parallax Card</title>
  <style>
    :root {
      --x: 0;
      --y: 0;
      --rx: 0deg;
      --ry: 0deg;
      --shine-x: 50%;
      --shine-y: 22%;
      --shine-opacity: .15;
      --radius: clamp(18px, 4vw, 34px);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #07120c;
      color: rgba(255, 255, 255, .92);
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Hiragino Sans",
        "Hiragino Kaku Gothic ProN",
        "Yu Gothic UI",
        "Yu Gothic",
        Meiryo,
        sans-serif;
    }

    body {
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 48px);
      isolation: isolate;
    }

    .page-bg {
      position: fixed;
      inset: 0;
      z-index: -5;
      background:
        radial-gradient(circle at calc(50% + var(--x) * 10%) calc(35% + var(--y) * 8%), rgba(150, 215, 130, .22), transparent 28%),
        radial-gradient(circle at 10% 10%, rgba(119, 183, 112, .18), transparent 28%),
        radial-gradient(circle at 88% 76%, rgba(42, 77, 51, .48), transparent 34%),
        linear-gradient(135deg, #06100b 0%, #122119 46%, #07110c 100%);
    }

    .page-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 50%, #000 0%, transparent 70%);
      opacity: .35;
    }

    .demo {
      width: min(94vw, calc(74svh * 4 / 3), 980px);
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .stage {
      width: 100%;
      perspective: 1200px;
      perspective-origin: 50% 45%;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: var(--radius);
      transform:
        rotateX(var(--rx))
        rotateY(var(--ry));
      transform-style: preserve-3d;
      transition: transform 80ms linear;
      will-change: transform;
      filter:
        drop-shadow(calc(var(--x) * -10px) calc(24px + var(--y) * 8px) 28px rgba(0, 0, 0, .42))
        drop-shadow(0 12px 60px rgba(42, 70, 45, .18));
    }

    .card-back {
      position: absolute;
      inset: 10px;
      border-radius: inherit;
      transform: translate3d(calc(var(--x) * -5px), calc(var(--y) * -4px + 12px), -26px) scale(.985);
      background: linear-gradient(135deg, rgba(65, 82, 62, .9), rgba(9, 17, 12, .96));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, .20),
        inset -20px 0 26px rgba(255, 255, 255, .06),
        inset 0 -20px 34px rgba(0, 0, 0, .24);
      z-index: 0;
      pointer-events: none;
    }

    .frame {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: inherit;
      transform: translateZ(26px);
      background: #132016;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, .13),
        inset 0 1px 0 rgba(255, 255, 255, .26);
    }

    .scene-plane {
      position: absolute;
      inset: -4%;
      transform-style: preserve-3d;
    }

    .layer {
      position: absolute;
      display: block;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      will-change: transform;
      transform-origin: center;
      transition: transform 90ms linear;
    }

    .layer-base {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: translate3d(calc(var(--x) * -8px), calc(var(--y) * -5px), 0);
      filter: saturate(1.04) contrast(1.015) brightness(1.02);
    }

    .layer-mid {
      left: 0%;
      top: 26.3889%;
      width: 100%;
      height: 52.3438%;
      transform: translate3d(calc(var(--x) * 5px), calc(var(--y) * 3px), 0);
      filter: drop-shadow(calc(var(--x) * -2px) calc(var(--y) * -1px) 4px rgba(0,0,0,.12));
    }

    .layer-left {
      left: 0%;
      top: 0%;
      width: 39.5833%;
      height: 100%;
      transform: translate3d(calc(var(--x) * 14px), calc(var(--y) * 8px), 0);
      filter: drop-shadow(calc(var(--x) * -4px) calc(var(--y) * -2px) 7px rgba(0,0,0,.18));
    }

    .layer-bottom {
      left: 0%;
      top: 59.2014%;
      width: 100%;
      height: 40.7986%;
      transform: translate3d(calc(var(--x) * 18px), calc(var(--y) * 10px), 0);
      filter: drop-shadow(calc(var(--x) * -4px) calc(var(--y) * -2px) 8px rgba(0,0,0,.20));
    }

    .layer-tree {
      left: 52.6693%;
      top: 0%;
      width: 47.3307%;
      height: 100%;
      transform: translate3d(calc(var(--x) * 24px), calc(var(--y) * 13px), 0);
      filter: drop-shadow(calc(var(--x) * -5px) calc(var(--y) * -3px) 10px rgba(0,0,0,.22));
    }

    .shade,
    .shine,
    .rim {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .shade {
      background:
        radial-gradient(circle at 50% 35%, transparent 0 48%, rgba(0,0,0,.16) 100%),
        linear-gradient(180deg, transparent 62%, rgba(0,0,0,.18) 100%);
      opacity: .7;
    }

    .shine {
      opacity: var(--shine-opacity);
      background:
        radial-gradient(circle at var(--shine-x) var(--shine-y), rgba(255,255,255,.75), rgba(255,255,255,.22) 12%, transparent 34%),
        linear-gradient(118deg, transparent 0 18%, rgba(255,255,255,.34) 24%, rgba(255,255,255,.08) 34%, transparent 48%);
      mix-blend-mode: screen;
    }

    .rim {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.20),
        inset 0 0 28px rgba(255,255,255,.06);
    }

    .hint {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px 12px 18px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 999px;
      background: rgba(4, 12, 8, .58);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(0, 0, 0, .25);
    }

    .status {
      min-width: 0;
      font-size: clamp(12px, 1.4vw, 14px);
      line-height: 1.55;
      color: rgba(255, 255, 255, .76);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex: 0 0 auto;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #102012;
      background: #e7ffd9;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        0 8px 22px rgba(0, 0, 0, .24);
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
    }

    button:hover { transform: translateY(-1px); }

    button.secondary {
      color: rgba(255,255,255,.86);
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255,255,255,.18);
    }

    @media (max-width: 620px) {
      body { padding: 16px; }
      .demo {
        width: min(96vw, calc(70svh * 4 / 3));
        gap: 14px;
      }
      .hint {
        align-items: stretch;
        flex-direction: column;
        border-radius: 22px;
        padding: 14px;
      }
      .status {
        white-space: normal;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      button {
        width: 100%;
        padding: 12px 10px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .card,
      .layer {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>

  <main class="demo">
    <section class="stage" id="stage" aria-label="スマホ傾き対応の庭園3Dパラックスカード">
      <article class="card" id="card">
        <div class="card-back" aria-hidden="true"></div>

        <div class="frame">
          <div class="scene-plane">
            <img class="layer layer-base" src="assets/garden-original.jpg" alt="緑の庭園、東屋、橋、大きな木が写っている写真" draggable="false" />
            <img class="layer layer-mid" src="assets/layer-midground.webp" alt="" aria-hidden="true" draggable="false" />
            <img class="layer layer-left" src="assets/layer-foreground-left.webp" alt="" aria-hidden="true" draggable="false" />
            <img class="layer layer-bottom" src="assets/layer-foreground-bottom.webp" alt="" aria-hidden="true" draggable="false" />
            <img class="layer layer-tree" src="assets/layer-foreground-tree.webp" alt="" aria-hidden="true" draggable="false" />
          </div>

          <div class="shade" aria-hidden="true"></div>
          <div class="shine" aria-hidden="true"></div>
          <div class="rim" aria-hidden="true"></div>
        </div>
      </article>
    </section>

    <aside class="hint" aria-live="polite">
      <div class="status" id="status">PCではマウス移動。スマホでは「傾きセンサーを使う」を押してから、端末をゆっくり傾けてください。</div>
      <div class="actions">
        <button type="button" id="sensorButton">傾きセンサーを使う</button>
        <button type="button" class="secondary" id="resetButton">中心をリセット</button>
      </div>
    </aside>
  </main>

  <script>
    (() => {
      const root = document.documentElement;
      const stage = document.getElementById('stage');
      const card = document.getElementById('card');
      const sensorButton = document.getElementById('sensorButton');
      const resetButton = document.getElementById('resetButton');
      const status = document.getElementById('status');

      const state = {
        targetX: 0,
        targetY: 0,
        currentX: 0,
        currentY: 0,
        sensorEnabled: false,
        baseBeta: null,
        baseGamma: null,
        lastBeta: null,
        lastGamma: null
      };

      const clamp = (value, min = -1, max = 1) => Math.min(max, Math.max(min, value));
      const round = (value) => Math.round(value * 1000) / 1000;

      function setTarget(x, y) {
        state.targetX = clamp(x);
        state.targetY = clamp(y);
      }

      function render() {
        state.currentX += (state.targetX - state.currentX) * 0.12;
        state.currentY += (state.targetY - state.currentY) * 0.12;

        const x = state.currentX;
        const y = state.currentY;

        root.style.setProperty('--x', round(x));
        root.style.setProperty('--y', round(y));
        root.style.setProperty('--rx', `${round(y * -7.5)}deg`);
        root.style.setProperty('--ry', `${round(x * 9.5)}deg`);
        root.style.setProperty('--shine-x', `${round(50 + x * 30)}%`);
        root.style.setProperty('--shine-y', `${round(24 + y * 22)}%`);
        root.style.setProperty('--shine-opacity', round(0.12 + Math.min(0.16, Math.hypot(x, y) * 0.12)));

        requestAnimationFrame(render);
      }

      function handleMouseMove(event) {
        if (state.sensorEnabled) return;

        const rect = card.getBoundingClientRect();
        const x = ((event.clientX - rect.left) / rect.width - 0.5) * 2;
        const y = ((event.clientY - rect.top) / rect.height - 0.5) * 2;
        setTarget(x, y);
      }

      function handleMouseLeave() {
        if (state.sensorEnabled) return;
        setTarget(0, 0);
      }

      function handleOrientation(event) {
        const beta = typeof event.beta === 'number' ? event.beta : 0;
        const gamma = typeof event.gamma === 'number' ? event.gamma : 0;

        state.lastBeta = beta;
        state.lastGamma = gamma;

        if (state.baseBeta === null || state.baseGamma === null) {
          state.baseBeta = beta;
          state.baseGamma = gamma;
        }

        const x = (gamma - state.baseGamma) / 20;
        const y = (beta - state.baseBeta) / 22;

        setTarget(x, y);
      }

      async function enableSensor() {
        if (typeof DeviceOrientationEvent === 'undefined') {
          status.textContent = 'この端末またはブラウザでは傾きセンサーを取得できません。PCではマウスで確認できます。';
          return;
        }

        try {
          if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            const result = await DeviceOrientationEvent.requestPermission();

            if (result !== 'granted') {
              status.textContent = '傾きセンサーの許可が出ていません。Safariなどで再読み込みして、もう一度ボタンを押してください。';
              return;
            }
          }

          window.removeEventListener('deviceorientation', handleOrientation, true);
          window.addEventListener('deviceorientation', handleOrientation, true);

          state.sensorEnabled = true;
          state.baseBeta = null;
          state.baseGamma = null;

          status.textContent = '傾きセンサーが有効です。今の持ち方を中心にして、ゆっくり傾けてください。';
        } catch (error) {
          status.textContent = '傾きセンサーの開始に失敗しました。HTTPS環境で開いているか確認してください。';
        }
      }

      function resetCenter() {
        if (state.sensorEnabled && state.lastBeta !== null && state.lastGamma !== null) {
          state.baseBeta = state.lastBeta;
          state.baseGamma = state.lastGamma;
          status.textContent = '現在のスマホ角度を中心として再設定しました。';
        } else {
          setTarget(0, 0);
          status.textContent = '中心位置に戻しました。PCではマウスをカード上で動かしてください。';
        }
      }

      stage.addEventListener('mousemove', handleMouseMove);
      stage.addEventListener('mouseleave', handleMouseLeave);
      sensorButton.addEventListener('click', enableSensor);
      resetButton.addEventListener('click', resetCenter);

      render();
    })();
  </script>
 </body>
</html>
